name: Security Scan

on:
  push:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/security-scan.yml'
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly discovered issues
    - cron: '0 8 * * 1'

permissions:
  contents: read
  pull-requests: write
  security-events: write  # Required for uploading SARIF results to GitHub Security tab

jobs:
  tfsec:
    name: tfsec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: '.'
          format: sarif
          additional_args: --out tfsec-results.sarif --soft-fail
        continue-on-error: true

      - name: Upload tfsec SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        if: always()
        with:
          sarif_file: tfsec-results.sarif

      - name: Run tfsec (human-readable summary)
        id: tfsec_summary
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: '.'
          format: lovely
          additional_args: --soft-fail
        continue-on-error: true

      - name: Post tfsec Summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const outcome = '${{ steps.tfsec_summary.outcome }}';
            const icon = outcome === 'success' ? '✅' : '⚠️';
            const body = `### ${icon} tfsec Security Scan: \`${outcome}\`
            Security findings (if any) have been uploaded to the **Security** tab of this repository.
            Review all HIGH and CRITICAL severity findings before merging.
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  checkov:
    name: Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@4b38516b47b2df46475d84383f9aa2c8ef912aae # v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        if: always()
        with:
          sarif_file: checkov-results.sarif
