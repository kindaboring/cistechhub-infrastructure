---
- name: Check Cistechhub Application Health
  hosts: tag_Project_cistechhub
  become: true
  vars:
    app_dir: /opt/cistechhub

  tasks:
    - name: Check Docker service status
      systemd:
        name: docker
        state: started
      register: docker_service

    - name: Get Docker Compose service status
      shell: |
        cd {{ app_dir }}
        docker-compose ps
      args:
        executable: /bin/bash
      register: compose_status

    - name: Display service status
      debug:
        var: compose_status.stdout_lines

    - name: Check disk usage
      shell: df -h /
      register: disk_usage

    - name: Display disk usage
      debug:
        var: disk_usage.stdout_lines

    - name: Check memory usage
      shell: free -h
      register: memory_usage

    - name: Display memory usage
      debug:
        var: memory_usage.stdout_lines

    - name: Get Docker stats
      shell: docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}"
      register: docker_stats

    - name: Display Docker container stats
      debug:
        var: docker_stats.stdout_lines

    - name: Check for Docker errors
      shell: |
        cd {{ app_dir }}
        docker-compose logs --tail=20 | grep -i error || echo "No errors found"
      args:
        executable: /bin/bash
      register: error_logs

    - name: Display recent errors
      debug:
        var: error_logs.stdout_lines

    - name: Test application endpoint
      uri:
        url: "http://{{ ansible_host }}"
        status_code: 200
      register: app_health
      ignore_errors: true

    - name: Display application health
      debug:
        msg: "Application is {{ 'HEALTHY' if app_health.status == 200 else 'UNHEALTHY' }}"
