---
- name: Backup MongoDB Database
  hosts: tag_Project_cistechhub
  become: true
  vars:
    app_dir: /opt/cistechhub
    backup_dir: /backup/mongodb
    backup_date: "{{ ansible_date_time.date }}"

  tasks:
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Get MongoDB credentials from environment file
      shell: |
        source {{ app_dir }}/.env
        echo "MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}"
        echo "MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}"
      args:
        executable: /bin/bash
      register: mongo_creds
      no_log: true

    - name: Perform MongoDB dump
      shell: |
        source {{ app_dir }}/.env
        cd {{ app_dir }}
        docker-compose exec -T mongodb mongodump \
          --username="${MONGO_ROOT_USERNAME}" \
          --password="${MONGO_ROOT_PASSWORD}" \
          --authenticationDatabase=admin \
          --db=cistechhub \
          --archive=/data/db/backup-{{ backup_date }}.archive \
          --gzip
      args:
        executable: /bin/bash

    - name: Copy backup from container to host
      shell: |
        cd {{ app_dir }}
        docker cp cistechhub-mongodb:/data/db/backup-{{ backup_date }}.archive {{ backup_dir }}/
      args:
        executable: /bin/bash

    - name: List backups
      find:
        paths: "{{ backup_dir }}"
        patterns: "backup-*.archive"
      register: backup_files

    - name: Display backup files
      debug:
        msg: "Backup created at {{ backup_dir }}/backup-{{ backup_date }}.archive"

    - name: Remove backups older than 7 days
      shell: |
        find {{ backup_dir }} -name "backup-*.archive" -mtime +7 -delete
      args:
        executable: /bin/bash
