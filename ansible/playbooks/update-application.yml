---
- name: Update Cistechhub Application (Rolling Update)
  hosts: tag_Project_cistechhub
  become: true
  serial: 1  # Update one server at a time
  vars:
    app_dir: /opt/cistechhub

  tasks:
    - name: Pull latest Docker images
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose pull
      args:
        executable: /bin/bash
      register: pull_result
      changed_when: true

    - name: Display pull results
      ansible.builtin.debug:
        var: pull_result.stdout_lines

    - name: Recreate and restart services
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose up -d --force-recreate
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for services to stabilize
      ansible.builtin.pause:
        seconds: 30

    - name: Check service health
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose ps
      args:
        executable: /bin/bash
      register: health_check
      changed_when: false

    - name: Display service status
      ansible.builtin.debug:
        var: health_check.stdout_lines

    - name: Verify application is responding
      ansible.builtin.uri:
        url: "http://localhost/health"
        status_code: 200
      retries: 5
      delay: 10
