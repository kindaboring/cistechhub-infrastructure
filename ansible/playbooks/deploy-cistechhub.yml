---
- name: Deploy Cistechhub Application
  hosts: tag_Project_cistechhub
  become: true
  vars:
    app_dir: /opt/cistechhub
    docker_compose_version: "latest"

  tasks:
    - name: Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_check
      failed_when: false
      changed_when: false

    - name: Check if Docker Compose is installed
      ansible.builtin.command: docker-compose --version
      register: docker_compose_check
      failed_when: false
      changed_when: false

    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Check if application is already set up
      ansible.builtin.stat:
        path: "{{ app_dir }}/docker-compose.yml"
      register: docker_compose_file

    - name: Wait for initial setup to complete
      ansible.builtin.wait_for:
        path: "{{ app_dir }}/docker-compose.yml"
        timeout: 600
      when: not docker_compose_file.stat.exists

    - name: Pull latest Docker images
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose pull
      args:
        executable: /bin/bash
      register: pull_result
      changed_when: true

    - name: Restart Docker Compose services
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose down
        docker-compose up -d
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for services to be healthy
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose ps
      args:
        executable: /bin/bash
      register: compose_status
      changed_when: false
      until: compose_status.rc == 0
      retries: 10
      delay: 10

    - name: Display service status
      ansible.builtin.debug:
        var: compose_status.stdout_lines

    - name: Get application logs
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose logs --tail=50
      args:
        executable: /bin/bash
      register: app_logs
      changed_when: false

    - name: Display recent logs
      ansible.builtin.debug:
        var: app_logs.stdout_lines
